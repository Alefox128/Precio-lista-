<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lista de Precios - One Quest Automotores</title>
<style>
  :root{
    --bg:#0b1220;
    --panel:#111a2b;
    --panel-2:#0f1626;
    --border:#233047;
    --border-strong:#2f4066;
    --text:#eef2f8;
    --text-secondary:#93a1bd;
    --text-muted:#5f6d8c;
    --blue:#2f6bff;
    --blue-dark:#1b3d8f;
    --black:#05070d;
    --green:#22c55e;
    --red:#ef4444;
    --amber:#f5a623;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
    padding-bottom:80px;
  }
  header{
    position:sticky;
    top:0;
    z-index:20;
    background:linear-gradient(180deg, var(--black), #0a1120);
    padding:16px 16px 12px;
    border-bottom:1px solid var(--border);
  }
  .brand{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .brand h1{
    font-size:17px;
    font-weight:700;
    margin:0;
    letter-spacing:.2px;
  }
  .brand span{
    display:block;
    font-size:11px;
    color:var(--text-secondary);
    margin-top:2px;
    font-weight:400;
  }
  .status{
    font-size:11px;
    padding:4px 9px;
    border-radius:20px;
    background:rgba(34,197,94,.12);
    color:var(--green);
    border:1px solid rgba(34,197,94,.35);
    white-space:nowrap;
  }
  .status.saving{
    background:rgba(245,166,35,.12);
    color:var(--amber);
    border-color:rgba(245,166,35,.35);
  }
  .status.error{
    background:rgba(239,68,68,.12);
    color:var(--red);
    border-color:rgba(239,68,68,.35);
  }
  .toolbar{
    display:flex;
    gap:8px;
    margin-top:12px;
  }
  .search{
    flex:1;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    color:var(--text);
    font-size:14px;
  }
  .search::placeholder{color:var(--text-muted);}
  .btn-add{
    background:var(--blue);
    border:none;
    border-radius:10px;
    color:#fff;
    font-size:20px;
    line-height:1;
    width:42px;
    font-weight:600;
  }
  .count{
    font-size:12px;
    color:var(--text-muted);
    margin-top:8px;
  }
  main{padding:12px;}
  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    margin-bottom:10px;
    overflow:hidden;
  }
  .card-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:12px 14px;
    gap:10px;
    cursor:pointer;
  }
  .card-title{flex:1; min-width:0;}
  .card-title .modelo{
    font-size:15px;
    font-weight:600;
    margin:0 0 2px;
    word-break:break-word;
  }
  .card-title .anio{
    font-size:12px;
    color:var(--text-secondary);
  }
  .card-price{
    text-align:right;
    white-space:nowrap;
  }
  .card-price .final{
    font-size:15px;
    font-weight:700;
    color:var(--green);
  }
  .card-price .entrega{
    font-size:11px;
    color:var(--text-muted);
    margin-top:2px;
  }
  .chevron{
    color:var(--text-muted);
    font-size:12px;
    margin-left:4px;
    transition:transform .15s;
  }
  .card.open .chevron{transform:rotate(90deg);}
  .card-body{
    display:none;
    padding:0 14px 14px;
    border-top:1px solid var(--border);
  }
  .card.open .card-body{display:block;}
  .field{
    margin-top:10px;
  }
  .field label{
    display:block;
    font-size:11px;
    color:var(--text-muted);
    margin-bottom:4px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.4px;
  }
  .field input, .field textarea{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:9px 10px;
    color:var(--text);
    font-size:14px;
    font-family:inherit;
  }
  .field input:focus, .field textarea:focus{
    outline:none;
    border-color:var(--blue);
  }
  .field textarea{
    resize:vertical;
    min-height:60px;
    line-height:1.4;
  }
  .row2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .actions{
    display:flex;
    gap:8px;
    margin-top:14px;
  }
  .btn{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:1px solid var(--border-strong);
    background:var(--panel-2);
    color:var(--text);
    font-size:13px;
    font-weight:600;
  }
  .btn.save{
    background:var(--blue);
    border-color:var(--blue);
    color:#fff;
  }
  .btn.save:active{background:var(--blue-dark);}
  .btn.del{
    color:var(--red);
    border-color:rgba(239,68,68,.35);
    flex:0 0 auto;
    width:44px;
  }
  .empty{
    text-align:center;
    padding:50px 20px;
    color:var(--text-muted);
    font-size:14px;
  }
  .toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--panel);
    border:1px solid var(--border-strong);
    color:var(--text);
    padding:10px 18px;
    border-radius:30px;
    font-size:13px;
    opacity:0;
    transition:opacity .2s, transform .2s;
    pointer-events:none;
    z-index:50;
    white-space:nowrap;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

  <div class="toolbar">

    <button class="btn-add" id="btnAdd">+</button>
  </div>
  <div class="count" id="count"></div>
</header>

<main id="list"></main>

<div class="toast" id="toast"></div>

": 11}, {"modelo": "PARTNER PATAGONICA 1.6 NAFTA C/GNC", "anio": 2016, "valor": 18500000, "transferencia": 841000, "valor_final": 19341000, "max_financiar": 8910000, "entrega_min": 10431000, "bonificacion": 1100000, "outlet_efectivo": 17400000, "caracteristicas": "113.000 KM / NAFTA Y GNC, AIRE ACONDICIONADO, DIRECCIÒN ASISTIDA, VIDRIOS ELECTRICOS, SENSOR DE ESTACIONAMIENTO, ALARMA", "id": 12}, {"modelo": "FIAT 600 Hybrid", "anio": "0KM", "valor": 48300000, "transferencia": 2500000, "valor_final": 50800000, "max_financiar": 26000000, "entrega_min": 24800000, "bonificacion": 10000000, "outlet_efectivo": null, "caracteristicas": "0 KM / 1.3 NAFTA, CLIMATIZADOR AUT, DIRECCIÒN ASISTIDA, CIERRE CENTRALIZADO, ENCENDIDO SIN LLAVES, CAJA AUT, MOTOR TURBO", "id": 13}, {"modelo": "FORD KA S 2017", "anio": 2017, "valor": 14800000, "transferencia": 790000, "valor_final": 15590000, "max_financiar": 7790000, "entrega_min": 7800000, "bonificacion": 200000, "outlet_efectivo": null, "caracteristicas": "167.000 km", "id": 14}, {"modelo": "ARGO DRIVE 1.3", "anio": "0KM", "valor": 38300000, "transferencia": 1800000, "valor_final": 40100000, "max_financiar": 24000000, "entrega_min": 16100000, "bonificacion": 10000000, "outlet_efectivo": null, "caracteristicas": null, "id": 15}, {"modelo": "PULSE AUDACE 1.0T CVT", "anio": "0KM", "valor": 47300000, "transferencia": 2200000, "valor_final": 49500000, "max_financiar": 26000000, "entrega_min": 23500000, "bonificacion": 10000000, "outlet_efectivo": null, "caracteristicas": null, "id": 16}, {"modelo": "STRADA Volcano", "anio": "0KM", "valor": 48300000, "transferencia": 2300000, "valor_final": 50600000, "max_financiar": 24000000, "entrega_min": 26600000, "bonificacion": 10000000, "outlet_efectivo": null, "caracteristicas": null, "id": 17}, {"modelo": "FIAT PALIO ATTRACTIVE 1.4 8V", "anio": 2014, "valor": 11500000, "transferencia": 750000, "valor_final": 12250000, "max_financiar": 6050000, "entrega_min": 6200000, "bonificacion": null, "outlet_efe const STORAGE_KEY = 'onequest-precios-v1';
let data = [];
let openId = null;
let saveTimer = null;

const $list = document.getElementById('list');
const $search = document.getElementById('search');
const $count = document.getElementById('count');
const $status = document.getElementById('status');
const $toast = document.getElementById('toast');

function money(n){
  if(n === null || n === undefined || n === '') return '-';
  const num = Number(n);
  if(isNaN(num)) return n;
  return '$' + num.toLocaleString('es-AR');
}

function showToast(msg){
  $toast.textContent = msg;
  $toast.classList.add('show');
  setTimeout(()=> $toast.classList.remove('show'), 1800);
}

function setStatus(mode){
  if(mode === 'saving'){
    $status.textContent = 'guardando...';
    $status.className = 'status saving';
  } else if(mode === 'error'){
    $status.textContent = 'sin conexión';
    $status.className = 'status error';
  } else {
    $status.textContent = 'sincronizado';
    $status.className = 'status';
  }
}

async function loadData(){
  try{
    const result = await window.storage.get(STORAGE_KEY, false);
    if(result && result.value){
      data = JSON.parse(result.value);
      setStatus('ok');
    } else {
      data = SEED;
      await persist(true);
    }
  } catch(e){
    data = SEED;
    setStatus('ok');
  }
  render();
}

async function persist(silent){
  setStatus('saving');
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(data), false);
    setStatus('ok');
    if(!silent) showToast('Guardado');
  } catch(e){
    setStatus('error');
    if(!silent) showToast('No se pudo guardar, reintentá');
  }
}

function scheduleSave(){
  setStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=> persist(false), 400);
}

function nextId(){
  return data.reduce((m,v)=> Math.max(m, v.id||0), 0) + 1;
}

function render(){
  const q = $search.value.trim().toLowerCase();
  const filtered = data.filter(v => (v.modelo||'').toLowerCase().includes(q));
  $count.textContent = filtered.length + ' vehículo' + (filtered.length===1?'':'s');

  if(filtered.length === 0){
    $list.innerHTML = '<div class="empty">No hay vehículos que coincidan</div>';
    return;
  }

  $list.innerHTML = filtered.map(v => cardHTML(v)).join('');

  filtered.forEach(v => {
    const card = document.getElementById('card-'+v.id);
    const head = card.querySelector('.card-head');
    head.addEventListener('click', () => toggleCard(v.id));

    card.querySelectorAll('[data-field]').forEach(input => {
      input.addEventListener('input', () => onFieldChange(v.id, input.dataset.field, input));
    });

    card.querySelector('.btn.del').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteCar(v.id);
    });
  });
}

function cardHTML(v){
  const isOpen = openId === v.id;
  return `
  <div class="card ${isOpen?'open':''}" id="card-${v.id}">
    <div class="card-head">
      <div class="card-title">
        <p class="modelo">${escapeHtml(v.modelo || 'Sin nombre')}</p>
        <span class="anio">${escapeHtml(String(v.anio ?? ''))}</span>
      </div>
      <div class="card-price">
        <div class="final">${money(v.valor_final)}</div>
        <div class="entrega">entrega ${money(v.entrega_min)}</div>
      </div>
      <div class="chevron">▶</div>
    </div>
    <div class="card-body">
      <div class="row2">
        <div class="field">
          <label>Modelo</label>
          <input type="text" data-field="modelo" value="${escapeAttr(v.modelo)}">
        </div>
        <div class="field">
          <label>Año</label>
          <input type="text" data-field="anio" value="${escapeAttr(v.anio)}">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Valor</label>
          <input type="number" data-field="valor" value="${v.valor ?? ''}">
        </div>
        <div class="field">
          <label>Transferencia</label>
          <input type="number" data-field="transferencia" value="${v.transferencia ?? ''}">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Valor final</label>
          <input type="number" data-field="valor_final" value="${v.valor_final ?? ''}">
        </div>
        <div class="field">
          <label>Max a financiar</label>
          <input type="number" data-field="max_financiar" value="${v.max_financiar ?? ''}">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Entrega mínima</label>
          <input type="number" data-field="entrega_min" value="${v.entrega_min ?? ''}">
        </div>
        <div class="field">
          <label>Bonificación</label>
          <input type="number" data-field="bonificacion" value="${v.bonificacion ?? ''}">
        </div>
      </div>
      <div class="field">
        <label>Outlet efectivo s/gasto</label>
        <input type="number" data-field="outlet_efectivo" value="${v.outlet_efectivo ?? ''}">
      </div>
      <div class="field">
        <label>Características</label>
        <textarea data-field="caracteristicas">${escapeHtml(v.caracteristicas ?? '')}</textarea>
      </div>
      <div class="actions">
        <button class="btn del" aria-label="Eliminar">✕</button>
        <button class="btn save">Listo</button>
      </div>
    </div>
  </div>`;
}

function toggleCard(id){
  openId = (openId === id) ? null : id;
  render();
}

function onFieldChange(id, field, input){
  const v = data.find(x => x.id === id);
  if(!v) return;
  let val = input.value;
  if(input.type === 'number'){
    val = val === '' ? null : Number(val);
  }
  v[field] = val;
  if(field === 'valor_final' || field === 'entrega_min' || field === 'modelo' || field === 'anio'){
    const card = document.getElementById('card-'+id);
    if(card){
      const finalEl = card.querySelector('.final');
      const entregaEl = card.querySelector('.entrega');
      const modeloEl = card.querySelector('.modelo');
      const anioEl = card.querySelector('.anio');
      if(finalEl) finalEl.textContent = money(v.valor_final);
      if(entregaEl) entregaEl.textContent = 'entrega ' + money(v.entrega_min);
      if(modeloEl) modeloEl.textContent = v.modelo || 'Sin nombre';
      if(anioEl) anioEl.textContent = String(v.anio ?? '');
    }
  }
  scheduleSave();
}

function deleteCar(id){
  if(!confirm('¿Eliminar este vehículo de la lista?')) return;
  data = data.filter(v => v.id !== id);
  if(openId === id) openId = null;
  render();
  persist(false);
}

function addCar(){
  const nv = {
    id: nextId(),
    modelo: 'Nuevo vehículo',
    anio: '',
    valor: null,
    transferencia: null,
    valor_final: null,
    max_financiar: null,
    entrega_min: null,
    bonificacion: null,
    outlet_efectivo: null,
    caracteristicas: ''
  };
  data.unshift(nv);
  openId = nv.id;
  render();
  persist(false);
  setTimeout(()=>{
    const card = document.getElementById('card-'+nv.id);
    if(card) card.scrollIntoView({behavior:'smooth', block:'start'});
  }, 50);
}

function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(str){
  if(str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

$search.addEventListener('input', render);
document.getElementById('btnAdd').addEventListener('click', addCar);

loadData();
</script>
