<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ONE QUEST Autos">
<link rel="manifest" id="pwa-manifest">
<title>ONE QUEST — Lista de Precios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c18;
    --surface: #0e1427;
    --surface2: #141c33;
    --border: rgba(255,255,255,0.07);
    --accent: #e8a020;
    --accent2: #f4c055;
    --text: #f0f4ff;
    --text2: #8892b0;
    --green: #22d97a;
    --red: #ff4d6d;
    --blue: #4d9fff;
    --radius: 14px;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,12,24,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    height: 60px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--accent);
    white-space: nowrap;
  }
  .logo span { color: var(--text2); font-size: 13px; letter-spacing: 1px; display: block; font-family: 'Outfit'; margin-top: -4px; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    margin-left: auto;
    background: var(--surface2);
    padding: 4px;
    border-radius: 10px;
  }
  .tab {
    padding: 6px 14px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab.active {
    background: var(--accent);
    color: #000;
  }

  /* MAIN */
  main { max-width: 900px; margin: 0 auto; padding: 16px; }

  /* SEARCH + FILTERS */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px 10px 40px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box::before {
    content: '🔍';
    position: absolute;
    left: 13px; top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    pointer-events: none;
  }
  .filter-btns {
    display: flex;
    gap: 6px;
  }
  .filter-btn {
    padding: 10px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .stat-chip strong { color: var(--accent); }

  /* CAR CARDS */
  .cars-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .car-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .car-card:hover { border-color: var(--accent); transform: translateY(-1px); }

  .car-card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
  }

  .brand-badge {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .car-main-info { flex: 1; min-width: 0; }
  .car-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    line-height: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .car-year-type {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 3px;
  }
  .year-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 5px;
    background: var(--surface2);
    color: var(--text2);
  }
  .okm-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 5px;
    background: rgba(34,217,122,0.15);
    color: var(--green);
    border: 1px solid rgba(34,217,122,0.25);
  }

  .car-price-main {
    text-align: right;
    flex-shrink: 0;
  }
  .price-label { font-size: 10px; color: var(--text2); letter-spacing: 0.5px; }
  .price-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .car-card-body {
    display: none;
    border-top: 1px solid var(--border);
  }
  .car-card.expanded .car-card-body { display: block; }

  .price-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: var(--border);
  }
  .price-item {
    background: var(--surface);
    padding: 12px 14px;
  }
  .price-item-label {
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }
  .price-item-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 0.5px;
  }
  .price-item-value.accent { color: var(--accent); }
  .price-item-value.green { color: var(--green); }
  .price-item-value.blue { color: var(--blue); }
  .price-item-value.red { color: var(--red); }

  .bono-row {
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(232,160,32,0.06);
    border-top: 1px solid rgba(232,160,32,0.15);
  }
  .bono-label { font-size: 11px; color: var(--accent2); letter-spacing: 0.5px; }
  .bono-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: var(--accent2);
  }

  .car-features {
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
    border-top: 1px solid var(--border);
  }

  .calc-btn-row {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
  }
  .calc-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s;
  }
  .calc-btn:hover { opacity: 0.85; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 48px 16px;
    color: var(--text2);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* ======================== CALCULATOR ======================== */
  .calc-view { display: none; }
  .calc-view.active { display: block; }
  .list-view { display: block; }
  .list-view.hidden { display: none; }

  .calc-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .calc-car-selector {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .calc-car-selector label {
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 8px;
  }
  .calc-car-selector select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    outline: none;
    cursor: pointer;
  }

  .calc-section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--text2);
    padding: 14px 16px 0;
  }

  .calc-inputs {
    padding: 12px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .calc-input-group { display: flex; flex-direction: column; gap: 5px; }
  .calc-input-group.full { grid-column: span 2; }
  .calc-input-group label {
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .calc-input-group input, .calc-input-group select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s;
  }
  .calc-input-group input:focus,
  .calc-input-group select:focus { border-color: var(--accent); }

  .calc-toggle-row {
    padding: 0 16px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .toggle-label { font-size: 13px; color: var(--text2); }
  .toggle {
    width: 40px; height: 22px;
    background: var(--surface2);
    border-radius: 11px;
    position: relative;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: '';
    width: 16px; height: 16px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 2px; left: 2px;
    transition: left 0.2s;
  }
  .toggle.on::after { left: 20px; }

  /* RESULTS */
  .calc-results {
    background: var(--surface2);
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .result-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .result-section:last-child { border-bottom: none; }
  .result-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--text2);
    margin-bottom: 10px;
  }
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    font-size: 13px;
  }
  .result-row .rl { color: var(--text2); }
  .result-row .rv {
    font-weight: 600;
    font-size: 14px;
  }
  .result-row .rv.big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.5px;
  }
  .result-row .rv.accent { color: var(--accent); }
  .result-row .rv.green { color: var(--green); }
  .result-row .rv.red { color: var(--red); }
  .result-row .rv.blue { color: var(--blue); }

  .alert-row {
    background: rgba(255,77,109,0.1);
    border: 1px solid rgba(255,77,109,0.3);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--red);
    margin-top: 8px;
  }
  .ok-row {
    background: rgba(34,217,122,0.08);
    border: 1px solid rgba(34,217,122,0.2);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--green);
    margin-top: 8px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 6px 0;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 480px) {
    .logo span { display: none; }
    .price-grid { grid-template-columns: 1fr 1fr; }
    .calc-inputs { grid-template-columns: 1fr; }
    .calc-input-group.full { grid-column: span 1; }
  }

  /* PRECIO DE VENTA (interno) */
  .precio-venta-box {
    background: rgba(232,160,32,0.06);
    border: 1px dashed rgba(232,160,32,0.35);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    grid-column: span 2;
  }
  .precio-venta-box label {
    font-size: 10px !important;
    color: var(--accent2) !important;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .precio-venta-box input {
    background: transparent !important;
    border: none !important;
    border-bottom: 1px solid rgba(232,160,32,0.3) !important;
    border-radius: 0 !important;
    padding: 4px 2px !important;
    color: var(--accent2) !important;
    font-size: 18px !important;
    font-weight: 700 !important;
    width: 100%;
  }
  .precio-venta-box input:focus { border-bottom-color: var(--accent) !important; outline: none; }
  .lock-icon { font-size: 10px; opacity: 0.6; }

  /* WHATSAPP BUTTON */
  .wa-btn {
    width: 100%;
    background: #25D366;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }
  .wa-btn:hover { opacity: 0.9; }
  .wa-btn:active { transform: scale(0.98); }
  .wa-btn:disabled { background: var(--surface2); color: var(--text2); cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">ONE QUEST<span>Lista de Precios</span></div>
    <div class="tabs">
      <button class="tab active" onclick="showView('list')">🚗 Autos</button>
      <button class="tab" onclick="showView('calc')">🧮 Calculadora</button>
    </div>
  </div>
</header>

<main>
  <!-- LIST VIEW -->
  <div class="list-view" id="listView">
    <div class="controls">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar por marca, modelo..." oninput="filterCars()">
      </div>
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Todos</button>
        <button class="filter-btn" data-filter="0km" onclick="setFilter('0km', this)">0KM</button>
        <button class="filter-btn" data-filter="used" onclick="setFilter('used', this)">Usados</button>
      </div>
    </div>
    <div class="stats-bar" id="statsBar"></div>
    <div class="cars-grid" id="carsGrid"></div>
  </div>

  <!-- CALCULATOR VIEW -->
  <div class="calc-view" id="calcView">
    <div class="calc-panel">
      <div class="calc-car-selector">
        <label>Seleccionar vehículo</label>
        <select id="calcCarSelect" onchange="updateCalc()">
          <option value="">— Elegir auto —</option>
        </select>
      </div>

      <div class="calc-section-title">CLIENTE</div>
      <div class="calc-inputs">
        <div class="calc-input-group full">
          <label>Nombre del cliente (opcional)</label>
          <input type="text" id="calcNombre" placeholder="Ej: Juan García" oninput="updateCalc()">
        </div>
      </div>

      <div class="calc-section-title">PRECIO INTERNO 🔒</div>
      <div class="calc-inputs">
        <div class="calc-input-group full">
          <label>Precio base del vehículo ($)</label>
          <input type="number" id="calcPrecioBase" placeholder="0" oninput="updateCalc()" step="10000">
        </div>
        <div class="calc-input-group">
          <label>Bonificación ($)</label>
          <input type="number" id="calcBono" placeholder="0" oninput="updateCalc()" step="10000">
        </div>
        <div class="calc-input-group">
          <label>Transferencia ($)</label>
          <input type="number" id="calcTransf" placeholder="0" oninput="updateCalc()" step="1000">
        </div>
        <div class="precio-venta-box">
          <label><span class="lock-icon">👁</span> PRECIO DE VENTA AL CLIENTE ($) — solo vos lo ves</label>
          <input type="number" id="calcPrecioVenta" placeholder="Dejar vacío = usar precio base" oninput="updateCalc()" step="10000">
        </div>
      </div>

      <div class="calc-section-title">FINANCIACIÓN</div>
      <div class="calc-inputs">
        <div class="calc-input-group full">
          <label>Entrega del cliente ($)</label>
          <input type="number" id="calcEntrega" placeholder="0" oninput="updateCalc()" step="10000">
        </div>
        <div class="calc-input-group">
          <label>Máx. a financiar ($)</label>
          <input type="number" id="calcMaxFin" placeholder="0" oninput="updateCalc()" step="10000">
        </div>
        <div class="calc-input-group">
          <label>Cuotas</label>
          <select id="calcCuotas" onchange="updateCalc()">
            <option value="12">12 cuotas</option>
            <option value="18">18 cuotas</option>
            <option value="24" selected>24 cuotas</option>
            <option value="36">36 cuotas</option>
            <option value="48">48 cuotas</option>
            <option value="60">60 cuotas</option>
          </select>
        </div>
      </div>

      <div class="calc-toggle-row">
        <div class="toggle" id="toggleTransf" onclick="toggleTransferencia()"></div>
        <span class="toggle-label">Incluir transferencia en la entrega</span>
      </div>

      <div class="calc-results" id="calcResults">
        <div class="result-section">
          <div style="color: var(--text2); font-size: 13px; text-align:center; padding: 8px 0;">Seleccioná un vehículo o ingresá datos para ver el análisis</div>
        </div>
      </div>
      <div style="padding:12px 16px 16px;">
        <button class="wa-btn" id="waBtnShare" onclick="compartirWhatsApp()" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.557 4.126 1.532 5.862L.057 23.428a.75.75 0 00.916.916l5.569-1.474A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.885 0-3.65-.52-5.163-1.428l-.36-.214-3.308.876.876-3.307-.214-.361A9.974 9.974 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
          Enviar presupuesto por WhatsApp
        </button>
      </div>
    </div>
  </div>
</main>

<script>
const CARS = [

// Sort: 0KM first alphabetically, then used alphabetically
CARS.sort((a, b) => {
  const aNew = a.year === '0KM' || a.year === '0km';
  const bNew = b.year === '0KM' || b.year === '0km';
  if (aNew && !bNew) return -1;
  if (!aNew && bNew) return 1;
  return a.name.localeCompare(b.name);
});

let currentFilter = 'all';
let inclTransf = false;

function getBrandEmoji(name) {
  name = name.toLowerCase();
  if (name.includes('ford') || name.includes('fiesta') || name.includes('focus') || name.includes('ecosport') || name.includes('ka ') || name.includes('ka s') || name.includes('saveiro') === false && name.includes('strada') === false && name.includes('partner') === false && name.includes('fiorino') === false) {
    if (name.includes('volkswagen') || name.includes('gol') || name.includes('suran') || name.includes('saveiro') || name.includes('vento') || name.includes('take up') || name.includes('cronos') === false && (name.includes('gol') || name.includes('suran') || name.includes('saveiro') || name.includes('vento'))) {}
  }
  if (name.includes('volkswagen') || name.includes('gol') || name.includes('suran') || name.includes('saveiro') || name.includes('vento') || name.includes('take up') || name.includes('argo') === false && name.includes('cronos') === false && name.includes('fiorino') === false && name.includes('palio') === false && name.includes('fastback') === false && name.includes('pulse') === false && name.includes('strada') === false) {
    if (name.includes('gol') || name.includes('suran') || name.includes('saveiro') || name.includes('vento') || name.includes('take up') || name.includes('volkswagen')) return '🔵';
  }
  if (name.includes('fiat') || name.includes('cronos') || name.includes('fiorino') || name.includes('palio') || name.includes('fastback') || name.includes('pulse') || name.includes('strada') || name.includes('argo')) return '🟥';
  if (name.includes('ford') || name.includes('fiesta') || name.includes('ka ') || name.includes('focus') || name.includes('ecosport') || name.includes('ka s')) return '🔷';
  if (name.includes('peugeot')) return '🦁';
  if (name.includes('renault') || name.includes('duster') || name.includes('partner') === false && name.includes('renault')) return '🔶';
  if (name.includes('partner') || name.includes('citroen')) return '⚙️';
  if (name.includes('toyota')) return '🔴';
  if (name.includes('chevrolet') || name.includes('corsa')) return '⭐';
  if (name.includes('suran') || name.includes('gol') || name.includes('saveiro') || name.includes('vento') || name.includes('take up')) return '🔵';
  return '🚗';
}

function getBrand(name) {
  name = name.toLowerCase();
  if (name.includes('volkswagen') || name.includes('gol') || name.includes('suran') || name.includes('saveiro') || name.includes('vento') || name.includes('take up')) return 'Volkswagen';
  if (name.includes('fiat') || name.includes('cronos') || name.includes('fiorino') || name.includes('palio') || name.includes('fastback') || name.includes('pulse') || name.includes('strada') || name.includes('argo')) return 'Fiat';
  if (name.includes('ford') || name.includes('fiesta') || name.includes('ecosport') || name.includes('focus') || name.includes('ka ') || name.includes('ka s')) return 'Ford';
  if (name.includes('peugeot')) return 'Peugeot';
  if (name.includes('renault') || name.includes('duster') || name.includes('oroch')) return 'Renault';
  if (name.includes('partner') || name.includes('citroen')) return 'Citroën/Peugeot';
  if (name.includes('toyota') || name.includes('hilux')) return 'Toyota';
  if (name.includes('chevrolet') || name.includes('corsa')) return 'Chevrolet';
  return 'Otro';
}

function fmt(n) {
  if (!n && n !== 0) return '—';
  return '$' + Math.round(n).toLocaleString('es-AR');
}

function renderCards(list) {
  const grid = document.getElementById('carsGrid');
  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>No se encontraron resultados</p></div>`;
    return;
  }
  grid.innerHTML = list.map((car, i) => {
    const isNew = car.year === '0KM' || car.year === '0km';
    const emoji = getBrandEmoji(car.name);
    return `
    <div class="car-card" id="card-${i}" onclick="toggleCard(${i})">
      <div class="car-card-header">
        <div class="brand-badge">${emoji}</div>
        <div class="car-main-info">
          <div class="car-name">${car.name}</div>
          <div class="car-year-type">
            ${isNew ? '<span class="okm-tag">✦ 0 KM</span>' : `<span class="year-tag">${car.year}</span>`}
            <span style="font-size:11px;color:var(--text2)">${getBrand(car.name)}</span>
          </div>
        </div>
        <div class="car-price-main">
          <div class="price-label">PRECIO</div>
          <div class="price-value">${fmt(car.valor)}</div>
        </div>
      </div>
      <div class="car-card-body">
        <div class="price-grid">
          <div class="price-item">
            <div class="price-item-label">Sin Transferencia</div>
            <div class="price-item-value accent">${fmt(car.valor)}</div>
          </div>
          <div class="price-item">
            <div class="price-item-label">Con Transferencia</div>
            <div class="price-item-value accent">${fmt(car.valorFinal)}</div>
          </div>
          <div class="price-item">
            <div class="price-item-label">Máx. a Financiar</div>
            <div class="price-item-value blue">${fmt(car.maxFinanciar)}</div>
          </div>
          <div class="price-item">
            <div class="price-item-label">Entrega mín. c/transf.</div>
            <div class="price-item-value green">${fmt(car.entregaCon)}</div>
          </div>
        </div>
        ${car.bono ? `<div class="bono-row"><span class="bono-label">✦ BONIFICACIÓN</span><span class="bono-value">${fmt(car.bono)}</span></div>` : ''}
        ${car.features ? `<div class="car-features">📋 ${car.features}</div>` : ''}
        <div class="calc-btn-row">
          <button class="calc-btn" onclick="event.stopPropagation(); loadInCalc(${i})">🧮 Calcular financiación</button>
        </div>
      </div>
    </div>`;
  }).join('');
  // Update stats
  const total = list.length;
  const okm = list.filter(c => c.year === '0KM' || c.year === '0km').length;
  const used = total - okm;
  const minP = Math.min(...list.map(c => c.valor));
  const maxP = Math.max(...list.map(c => c.valor));
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip"><strong>${total}</strong> vehículos</div>
    <div class="stat-chip"><strong>${okm}</strong> 0KM / <strong>${used}</strong> usados</div>
    <div class="stat-chip">Desde <strong>${fmt(minP)}</strong></div>
    <div class="stat-chip">Hasta <strong>${fmt(maxP)}</strong></div>
  `;
}

function toggleCard(i) {
  const card = document.getElementById('card-' + i);
  card.classList.toggle('expanded');
}

function loadInCalc(i) {
  const car = CARS[i];
  showView('calc');
  document.getElementById('calcCarSelect').value = i;
  document.getElementById('calcPrecioBase').value = car.valor;
  document.getElementById('calcBono').value = car.bono || 0;
  document.getElementById('calcTransf').value = car.transferencia;
  document.getElementById('calcMaxFin').value = car.maxFinanciar;
  document.getElementById('calcEntrega').value = '';
  document.getElementById('calcPrecioVenta').value = '';
  updateCalc();
}

function filterCars() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = CARS;
  if (currentFilter === '0km') filtered = filtered.filter(c => c.year === '0KM' || c.year === '0km');
  if (currentFilter === 'used') filtered = filtered.filter(c => c.year !== '0KM' && c.year !== '0km');
  if (q) filtered = filtered.filter(c => c.name.toLowerCase().includes(q) || getBrand(c.name).toLowerCase().includes(q));
  renderCards(filtered);
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCars();
}

function showView(v) {
  document.getElementById('listView').classList.toggle('hidden', v !== 'list');
  document.getElementById('calcView').classList.toggle('active', v === 'calc');
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && v === 'list') || (i === 1 && v === 'calc')));
}

// Populate car selector in calc
function populateCalcSelect() {
  const sel = document.getElementById('calcCarSelect');
  CARS.forEach((car, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${car.name} (${car.year})`;
    sel.appendChild(opt);
  });
}

function toggleTransferencia() {
  inclTransf = !inclTransf;
  document.getElementById('toggleTransf').classList.toggle('on', inclTransf);
  updateCalc();
}

document.getElementById('calcCarSelect').addEventListener('change', function() {
  const i = this.value;
  if (i === '') return;
  const car = CARS[i];
  document.getElementById('calcPrecioBase').value = car.valor;
  document.getElementById('calcBono').value = car.bono || 0;
  document.getElementById('calcTransf').value = car.transferencia;
  document.getElementById('calcMaxFin').value = car.maxFinanciar;
  document.getElementById('calcPrecioVenta').value = '';
  updateCalc();
});

function updateCalc() {
  const precioBase = parseFloat(document.getElementById('calcPrecioBase').value) || 0;
  const bono = parseFloat(document.getElementById('calcBono').value) || 0;
  const transf = parseFloat(document.getElementById('calcTransf').value) || 0;
  const entrega = parseFloat(document.getElementById('calcEntrega').value) || 0;
  const maxFin = parseFloat(document.getElementById('calcMaxFin').value) || 0;
  const cuotas = parseInt(document.getElementById('calcCuotas').value) || 24;
  const precioVentaRaw = parseFloat(document.getElementById('calcPrecioVenta').value);
  // Precio que ve el cliente: si pusiste uno manual, ese; si no, precio base
  const precioVenta = precioVentaRaw > 0 ? precioVentaRaw : precioBase;

  const waBtn = document.getElementById('waBtnShare');

  if (precioBase === 0) {
    document.getElementById('calcResults').innerHTML = `<div class="result-section"><div style="color:var(--text2);font-size:13px;text-align:center;padding:8px 0">Ingresá el precio del vehículo</div></div>`;
    waBtn.disabled = true;
    return;
  }

  const precioConTransf = precioBase + transf;
  const precioNeto = precioBase - bono;
  const precioNetoConTransf = precioConTransf - bono;
  // Para cálculo financiero usamos precio base real (interno)
  let montoAFinanciar;
  if (inclTransf) {
    montoAFinanciar = precioNetoConTransf - entrega;
  } else {
    montoAFinanciar = precioNeto - entrega;
  }

  const cuotaEstimada = montoAFinanciar > 0 ? montoAFinanciar / cuotas : 0;
  const excedeMax = maxFin > 0 && montoAFinanciar > maxFin;
  const entregaSuficiente = entrega > 0 && montoAFinanciar <= maxFin && montoAFinanciar > 0;

  // Precio de venta al cliente (con o sin transf)
  const precioVentaConTransf = precioVenta + transf;

  let html = `
  <div class="result-section">
    <div class="result-title">RESUMEN INTERNO</div>
    <div class="result-row"><span class="rl">Precio base</span><span class="rv">${fmt(precioBase)}</span></div>
    ${bono > 0 ? `<div class="result-row"><span class="rl">— Bonificación</span><span class="rv" style="color:var(--green)">- ${fmt(bono)}</span></div>` : ''}
    <div class="result-row"><span class="rl">Transferencia</span><span class="rv">${fmt(transf)}</span></div>
    <hr class="divider">
    <div class="result-row"><span class="rl">Precio neto sin transf.</span><span class="rv accent">${fmt(precioNeto)}</span></div>
    <div class="result-row"><span class="rl">Precio neto con transf.</span><span class="rv accent">${fmt(precioNetoConTransf)}</span></div>
    ${precioVentaRaw > 0 ? `<hr class="divider"><div class="result-row"><span class="rl" style="color:var(--accent2)">👁 Precio de venta al cliente</span><span class="rv" style="color:var(--accent2);font-weight:700">${fmt(precioVenta)}</span></div><div class="result-row"><span class="rl" style="color:var(--accent2)">👁 Con transferencia</span><span class="rv" style="color:var(--accent2)">${fmt(precioVentaConTransf)}</span></div>` : ''}
  </div>`;

  if (entrega > 0) {
    html += `
  <div class="result-section">
    <div class="result-title">ANÁLISIS DE LA OPERACIÓN</div>
    <div class="result-row"><span class="rl">Entrega del cliente</span><span class="rv green">${fmt(entrega)}</span></div>
    <div class="result-row">
      <span class="rl">La entrega ${inclTransf ? 'incluye' : 'NO incluye'} transferencia</span>
      <span class="rv" style="font-size:12px;color:var(--text2)">${inclTransf ? '✓' : '✗'}</span>
    </div>
    <hr class="divider">
    <div class="result-row">
      <span class="rl">Monto a financiar</span>
      <span class="rv ${excedeMax ? 'red' : 'blue'} big">${fmt(Math.max(0, montoAFinanciar))}</span>
    </div>
    ${maxFin > 0 ? `<div class="result-row"><span class="rl">Máximo permitido</span><span class="rv">${fmt(maxFin)}</span></div>` : ''}
    ${excedeMax ? `<div class="alert-row">⚠️ Excede el máximo a financiar por <strong>${fmt(montoAFinanciar - maxFin)}</strong>. Aumentar entrega o bonificación.</div>` : ''}
    ${entregaSuficiente ? `<div class="ok-row">✓ Operación viable. El monto a financiar está dentro del límite.</div>` : ''}
    ${montoAFinanciar <= 0 ? `<div class="ok-row">✓ El cliente cubre el total con la entrega. Sin financiación necesaria.</div>` : ''}
  </div>`;

    if (montoAFinanciar > 0) {
      html += `
  <div class="result-section">
    <div class="result-title">CUOTAS ESTIMADAS</div>
    <div class="result-row"><span class="rl">Cantidad de cuotas</span><span class="rv">${cuotas}</span></div>
    <div class="result-row">
      <span class="rl">Cuota estimada (sin interés)</span>
      <span class="rv accent big">${fmt(cuotaEstimada)}</span>
    </div>
    <div style="font-size:11px;color:var(--text2);margin-top:6px;padding:0 0 4px">* Valor referencial sin aplicar TNA. La cuota final depende de la entidad financiera.</div>
  </div>`;
    }
    waBtn.disabled = false;
  } else {
    html += `
  <div class="result-section">
    <div style="color:var(--text2);font-size:13px;text-align:center;padding:6px 0">Ingresá la entrega del cliente para ver el análisis de financiación</div>
  </div>`;
    waBtn.disabled = (precioBase === 0);
  }

  document.getElementById('calcResults').innerHTML = html;
}

function compartirWhatsApp() {
  const precioBase = parseFloat(document.getElementById('calcPrecioBase').value) || 0;
  const precioVentaRaw = parseFloat(document.getElementById('calcPrecioVenta').value);
  const precioVenta = precioVentaRaw > 0 ? precioVentaRaw : precioBase;
  const transf = parseFloat(document.getElementById('calcTransf').value) || 0;
  const entrega = parseFloat(document.getElementById('calcEntrega').value) || 0;
  const cuotas = parseInt(document.getElementById('calcCuotas').value) || 24;
  const bono = parseFloat(document.getElementById('calcBono').value) || 0;
  const nombre = document.getElementById('calcNombre').value.trim();
  const carIdx = document.getElementById('calcCarSelect').value;
  const carName = carIdx !== '' ? CARS[carIdx].name : 'Vehículo';
  const carYear = carIdx !== '' ? CARS[carIdx].year : '';

  const precioVentaConTransf = precioVenta + transf;
  const precioNeto = precioBase - bono;
  const precioNetoConTransf = precioNeto + transf;

  let montoFin;
  if (inclTransf) {
    montoFin = precioNetoConTransf - entrega;
  } else {
    montoFin = precioNeto - entrega;
  }
  const cuotaEst = montoFin > 0 ? montoFin / cuotas : 0;

  // Precio que ve el cliente: el de venta (sin mostrar descuento ni precio real)
  const precioClienteSinTransf = precioVenta;
  const precioClienteConTransf = precioVenta + transf;

  let msg = `🚗 *ONE QUEST Automotores*
`;
  msg += `━━━━━━━━━━━━━━━━━━━━
`;
  if (nombre) msg += `👤 *Cliente:* ${nombre}
`;
  msg += `🏷 *${carName}*${carYear ? ` (${carYear})` : ''}
`;
  msg += `━━━━━━━━━━━━━━━━━━━━
`;
  msg += `💰 *Precio del vehículo:* ${fmt(precioClienteSinTransf)}
`;
  msg += `📋 *Transferencia:* ${fmt(transf)}
`;
  msg += `✅ *Precio total:* ${fmt(precioClienteConTransf)}
`;
  msg += `━━━━━━━━━━━━━━━━━━━━
`;
  if (entrega > 0) {
    msg += `💵 *Entrega:* ${fmt(entrega)}${inclTransf ? ' (incluye transferencia)' : ''}
`;
    if (montoFin > 0) {
      msg += `🏦 *Financia:* ${fmt(montoFin)}
`;
      msg += `📅 *${cuotas} cuotas de aprox.:* ${fmt(cuotaEst)}
`;
    } else {
      msg += `✔️ Cubre el total con la entrega
`;
    }
    msg += `━━━━━━━━━━━━━━━━━━━━
`;
  }
  msg += `📍 _ONE QUEST Automotores, Mendoza_
`;
  msg += `_Consultas sin compromiso_ 😊`;

  const url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}
